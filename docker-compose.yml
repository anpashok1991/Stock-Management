version: "3.8"

services:
  stockmanagement:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stockmanagement-web
    ports:
      - "5000:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/stockmanagement.db
    volumes:
      - dbdata:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  dbdata:
    driver: local
